# socket_path is optional. Defaults:
# - macOS: ~/.mango/mango.sock
# - Linux: /var/run/mango/mango.sock
# Override with MANGO_SOCKET_PATH environment variable or set here:
# socket_path: /custom/path/mango.sock

discord:
  token: "${DISCORD_TOKEN}"

agents:
  - name: orchestrator
    work_dir: /var/lib/mango/agents/orchestrator
    role: orchestrator
    llm:
      provider: anthropic
      model: claude-sonnet-4-20250514
      api_key: "${ANTHROPIC_API_KEY}"

  - name: researcher
    work_dir: /var/lib/mango/agents/researcher
    capabilities: [web_search]
    llm:
      provider: ollama
      model: llama3.2
      base_url: http://localhost:11434/v1

  - name: coder
    work_dir: /var/lib/mango/agents/coder
    capabilities: [code_execution]
    llm:
      provider: openai-compatible
      model: qwen2.5-coder
      base_url: http://localhost:11434/v1
      api_key: "${CODER_API_KEY}"

bindings:
  - channel_id: "123456789"
    agent: researcher
  - channel_id: "987654321"
    agent: coder

